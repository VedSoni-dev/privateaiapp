name: PrivateAI
options:
  bundleIdPrefix: inc.neocast
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  developmentLanguage: en
settings:
  base:
    SWIFT_VERSION: "5.0"
    TARGETED_DEVICE_FAMILY: "1,2"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    CURRENT_PROJECT_VERSION: "1"
    MARKETING_VERSION: "3.0.0"
packages:
  RevenueCat:
    url: https://github.com/RevenueCat/purchases-ios-spm
    from: 5.14.0
targets:
  PrivateAI:
    type: application
    platform: iOS
    sources:
      - path: PrivateAI
        excludes:
          - Resources/Info.plist
      - path: Shared
    resources:
      - path: PrivateAI/Resources/Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: inc.neocast.privateai
        PRODUCT_NAME: Private AI
        INFOPLIST_FILE: PrivateAI/Resources/Info.plist
        GENERATE_INFOPLIST_FILE: false
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_ENTITLEMENTS: PrivateAI/Resources/PrivateAI.entitlements
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: false
    dependencies:
      - target: PrivateAIWidget
      - target: ShareExtension
      - target: MessagesExtension
        embed: true
      - package: RevenueCat
        product: RevenueCat
      - package: RevenueCat
        product: RevenueCatUI

  PrivateAIWidget:
    type: app-extension
    platform: iOS
    sources:
      - path: PrivateAIWidget
        excludes:
          - Info.plist
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: inc.neocast.privateai.widget
        PRODUCT_NAME: PrivateAIWidget
        INFOPLIST_FILE: PrivateAIWidget/Info.plist
        GENERATE_INFOPLIST_FILE: false
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_ENTITLEMENTS: PrivateAIWidget/PrivateAIWidget.entitlements
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks @executable_path/../../Frameworks"
        SKIP_INSTALL: true

  ShareExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: ShareExtension
        excludes:
          - Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: inc.neocast.privateai.share
        PRODUCT_NAME: ShareExtension
        INFOPLIST_FILE: ShareExtension/Info.plist
        GENERATE_INFOPLIST_FILE: false
        CODE_SIGN_STYLE: Automatic
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks @executable_path/../../Frameworks"
        SKIP_INSTALL: true

  MessagesExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: MessagesExtension
        excludes:
          - Info.plist
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: inc.neocast.privateai.messages
        PRODUCT_NAME: MessagesExtension
        INFOPLIST_FILE: MessagesExtension/Info.plist
        GENERATE_INFOPLIST_FILE: false
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_ENTITLEMENTS: MessagesExtension/MessagesExtension.entitlements
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks @executable_path/../../Frameworks"
        SKIP_INSTALL: true
    dependencies:
      - sdk: Messages.framework

schemes:
  PrivateAI:
    build:
      targets:
        PrivateAI: all
        PrivateAIWidget: all
        ShareExtension: all
        MessagesExtension: all
    run:
      config: Debug
    archive:
      config: Release
