services:
  - type: web
    name: private-ai-backend
    runtime: docker
    dockerContext: ./server
    dockerfilePath: ./server/Dockerfile
    plan: free
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 3000
      - key: PRIVATEMODE_MODEL
        value: gpt-oss-120b
      - key: PRIVATEMODE_MODEL_PRO
        value: kimi-k2.6
      - key: PRIVATEMODE_API_KEY
        sync: false
